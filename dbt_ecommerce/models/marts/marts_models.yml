version: 2

models:
  - name: dim_customers
    description: >
      SCD Type 2 dimension for customers. One row per version of each
      customer. Valid_from/valid_to define the lifetime of each version.
      is_current marks the latest version per customer (false for deleted).
    columns:
      - name: customer_sk
        description: "Surrogate key — hash of (customer_id, lsn). Unique per version."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Natural key — Postgres primary key. Repeats across versions."
        tests:
          - not_null
      - name: email
        tests:
          - not_null
      - name: valid_from
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null

  - name: dim_products
    description: >
      SCD Type 2 dimension for products. The price-history use case is the
      headline value: enables fct_orders to join to "the version of the
      product valid at time of order" rather than the current version.
    columns:
      - name: product_sk
        description: "Surrogate key — hash of (product_id, lsn). Unique per version."
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: sku
        tests:
          - not_null
      - name: current_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: valid_from
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null

  - name: fct_orders
    description: >
      Order fact table. One row per order. Joined to dim_customers using
      point-in-time logic on placed_at — preserves customer state at time
      of order even after customer attributes change.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: customer_sk
        description: "Foreign key to dim_customers — version valid at order time."
        tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_sk
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values: ['pending', 'confirmed', 'shipped', 'delivered', 'cancelled']
      - name: order_total
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: placed_at
        tests:
          - not_null

  - name: fct_order_items
    description: >
      Line-item fact table. One row per (order, product) line. Point-in-time
      joins to BOTH dim_customers and dim_products via the parent order's
      placed_at.
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: product_id
        tests:
          - not_null
      - name: customer_sk
        tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_sk
      - name: product_sk
        tests:
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_sk
      - name: quantity
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
      - name: unit_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: line_total
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
