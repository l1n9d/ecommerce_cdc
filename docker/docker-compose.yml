# Redpanda + Kafka Connect + Console
# Connect runs Debezium for Postgres CDC, plus the Snowflake sink (Day 6).

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: cdc-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "9092:9092"     # Kafka API for clients on host machine
      - "8082:8082"     # HTTP proxy for Kafka
      - "9644:9644"     # Admin API
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10

  connect:
    # Debezium ships its own Kafka Connect Docker image with the Debezium plugin
    # already installed. We add the Snowflake Sink plugin via volume mount.
    image: debezium/connect:2.7.0.Final
    container_name: cdc-connect
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8083:8083"     # Connect REST API
    environment:
      # Talks to Redpanda over the internal docker network
      BOOTSTRAP_SERVERS: redpanda:29092
      GROUP_ID: cdc-connect-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      # Path where Connect looks for plugins. Default debezium image already
      # has /kafka/connect populated with debezium-connector-postgres etc.
      # We extend it with /custom-plugins for the Snowflake sink.
      CONNECT_PLUGIN_PATH: "/kafka/connect,/custom-plugins"
    volumes:
      - ./custom-plugins:/custom-plugins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: cdc-console
    depends_on:
      - redpanda
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
      CONNECT_ENABLED: "true"
      CONNECT_CLUSTERS_NAME: cdc-connect
      CONNECT_CLUSTERS_URL: http://connect:8083
